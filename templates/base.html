<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartATS – Resume ATS Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Optimize your resume for ATS systems with instant scoring, keyword analysis, and actionable feedback for tech roles.">
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}"
  >
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/circular-progress.css') }}"
  >
  <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <div class="header-content">
        <h1>SmartATS</h1>
        <p>AI-free Resume Analyzer for Tech Roles</p>
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
  
  <footer class="site-footer">
    <p>&copy; 2025 SmartATS. Pure Python ATS Analyzer. No AI APIs required.</p>
  </footer>
</body>
</html>
