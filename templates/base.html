<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartATS – Resume ATS Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Optimize your resume for ATS systems with instant scoring, keyword analysis, and actionable feedback for tech roles.">
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}"
  >
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/circular-progress.css') }}"
  >
  <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <div class="header-content">
        <h1>SmartATS</h1>
        <p>Resume Analyzer for Tech Roles</p>
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle blue/pink theme">
        <span class="theme-icon male-icon">♂</span>
        <span class="theme-icon female-icon">♀</span>
      </button>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
  
  <footer class="site-footer">
    <p style="margin: 0 0 0.5rem 0;">&copy; 2026 SmartATS. Pure Python Logic based Resume Analyzer.</p>
    <p style="margin: 0; font-size: 0.95rem; color: var(--accent);">Helping careers flourish with intelligent resume analysis ✨</p>
  </footer>
</body>
</html>
